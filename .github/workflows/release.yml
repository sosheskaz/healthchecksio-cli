name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.2.3)'
        required: true
      tap_github_token:
        description: 'GitHub token for authent'
        required: false
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      tap_github_token:
        required: false
        type: string
    secrets:
      BREW_PAT:
        description: 'PAT for pushing to the homebrew-tap repo'
        required: false

permissions:
  contents: write
  packages: write

env:
  REF: ${{ inputs.release_tag || github.ref }}
  TAP_GITHUB_TOKEN: ${{ inputs.tap_github_token || secrets.BREW_PAT || github.token }}
  GOTOOLCHAIN: local

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    # Serialize releases: concurrent runs would race on the ghcr.io
    # latest/major tags, letting an older release finish last and win.
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          ref: ${{ env.REF }}
          fetch-depth: 0
          fetch-tags: true
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: 'ko go goreleaser'
          # Published artifacts must never be built from state a PR-writable
          # cache could have poisoned; releases pay for pristine toolchains.
          cache: false

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Release with GoReleaser
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

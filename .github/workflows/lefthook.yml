name: Lefthook

on:
  pull_request:
    branches: [main]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: lefthook-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: lefthook aqua:rhysd/actionlint

      - name: Run lefthook pre-commit
        env:
          MISE_EXEC_AUTO_INSTALL: "false"
          MISE_TASK_RUN_AUTO_INSTALL: "false"
          YAMLLINT_FORMAT: github
        run: |
          files=()
          while IFS= read -r file; do
            files+=(--file "$file")
          done < <(git diff --name-only --diff-filter=ACMR \
            "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No changed files to lint"
            exit 0
          fi

          lefthook run pre-commit "${files[@]}"

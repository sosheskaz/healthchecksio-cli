name: GoReleaser

# Path-filtered: NOT suitable as a required branch-protection check (a PR
# that doesn't touch these paths would leave the check pending forever).
# ci.yml is the always-run candidate for required checks.
on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - .goreleaser.yaml
      - mise.toml
      - .github/workflows/goreleaser.yml
      - .github/workflows/release.yml
      - .release-please-manifest.json
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref == 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  CGO_ENABLED: '0'
  GOTOOLCHAIN: local

jobs:
  snapshot:
    name: Snapshot build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: 'go goreleaser ko'

      - name: Validate configuration
        run: goreleaser check

      - name: Snapshot release (no publish)
        run: goreleaser release --snapshot --clean

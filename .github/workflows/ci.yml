name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CGO_ENABLED: '0'

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: 'go golangci-lint goreleaser'
      - name: Setup Golang caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            ~/.cache/golangci-lint
          key: ${{ runner.os }}-golang-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-golang-

      - name: Mod download
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Mod tidy
        run: go mod tidy -diff -v

      - name: Test
        run: go test -v ./...

      - name: Lint
        run: |
          echo "::add-matcher::.github/problem-matchers/golangci-lint.json"
          golangci-lint run --output.text.path=stdout --output.text.print-issued-lines=false --output.text.colors=false
          echo "::remove-matcher owner=golangci-lint::"

      - name: Check goreleaser
        run: |
          goreleaser check
          goreleaser release --snapshot --clean

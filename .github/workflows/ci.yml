name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CGO_ENABLED: '0'

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install_args: 'go golangci-lint'
      - name: Setup Golang caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            ~/.cache/golangci-lint
          key: ${{ runner.os }}-golang-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-golang-

      - name: Mod download
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Mod tidy
        run: go mod tidy -diff -v

      - name: Test
        run: go test -v ./...

      - name: Lint
        run: |
          echo "::add-matcher::.github/problem-matchers/golangci-lint.json"
          golangci-lint run --output.text.path=stdout --output.text.print-issued-lines=false --output.text.colors=false
          echo "::remove-matcher owner=golangci-lint::"

  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install_args: 'go goreleaser'

      - name: Check goreleaser
        run: |
          goreleaser check
          goreleaser release --snapshot --clean

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - name: Run lefthook pre-commit
        env:
          MISE_EXEC_AUTO_INSTALL: "false"
          MISE_TASK_RUN_AUTO_INSTALL: "false"
          YAMLLINT_FORMAT: github
        run: lefthook run --all-files pre-commit

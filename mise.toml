# mise 2026.7.12 switched the npm backend to install in-process via embedded
# aube, which fails to resolve deps for renovate/release-please. Route npm
# installs back through the npm CLI until the aube resolver handles them.
[settings]
npm.shell_out = true

[tools]
go = "1.26.5"
golangci-lint = "2.12.2"
goreleaser = "2.17.0"
ko = "0.19.1"

lefthook = "2.1.10"
"aqua:rhysd/actionlint" = "1.7.12"
"aqua:koalaman/shellcheck" = "0.11.0"
"go:golang.org/x/vuln/cmd/govulncheck" = "1.5.0"
yamllint = "1.38.0"
zizmor = "1.27.0"

node = "24.18.0"
"npm:renovate" = "43.264.2"
"npm:release-please" = "17.10.3"
